<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP5 - Click Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">TP 5 : Traitement de flux</h1>
    <p class="text-gray-500 text-sm mb-6">Comptage de clics avec Kafka Streams</p>

    <div class="mb-6 text-left">
        <label for="userSelect" class="block text-sm font-medium text-gray-700 mb-2">Choisir un utilisateur :</label>
        <select id="userSelect" class="block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            <option value="user1">User 1</option>
            <option value="user2">User 2</option>
            <option value="user3">User 3</option>
        </select>
    </div>

    <button onclick="sendClick()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
        Cliquez ici
    </button>

    <p id="status" class="mt-4 text-sm font-semibold text-green-600 h-5 transition-all duration-300"></p>
</div>

<script>
    function sendClick() {
        const user = document.getElementById("userSelect").value;
        const statusEl = document.getElementById("status");

        // Effet visuel rapide
        statusEl.innerText = "Envoi...";
        statusEl.className = "mt-4 text-sm font-semibold text-gray-500 h-5";

        // Requête POST vers l'endpoint Spring Boot
        fetch('/click?userId=' + user, { method: 'POST' })
            .then(response => response.text())
            .then(data => {
                statusEl.className = "mt-4 text-sm font-semibold text-green-600 h-5";
                statusEl.innerText = data;

                // Efface le message après 1.5 seconde
                setTimeout(() => {
                    if (statusEl.innerText === data) statusEl.innerText = "";
                }, 1500);
            })
            .catch(error => {
                statusEl.className = "mt-4 text-sm font-semibold text-red-600 h-5";
                statusEl.innerText = "Erreur lors de l'envoi du clic";
            });
    }
</script>
</body>
</html>
