<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="bg-gray-50 border-b border-gray-200 px-6 py-5">
      <h2 class="text-xl font-bold text-gray-900">Register New Client</h2>
      <p class="text-sm text-gray-500 mt-1">Enter the client's administrative details below.</p>
    </div>

    <div class="p-6">
      <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
          <input
            type="text"
            formControlName="name"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all"
            placeholder="Jane Doe"
          />
          <span
            *ngIf="newCustomerFormGroup.controls['name'].touched && newCustomerFormGroup.controls['name'].errors?.['required']"
            class="text-red-500 text-xs mt-1 block"
          >
            Name is required.
          </span>
          <span
            *ngIf="newCustomerFormGroup.controls['name'].touched && newCustomerFormGroup.controls['name'].errors?.['minlength']"
            class="text-red-500 text-xs mt-1 block"
          >
            Name must have at least 4 characters.
          </span>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all"
            placeholder="jane.doe@example.com"
          />
          <span
            *ngIf="newCustomerFormGroup.controls['email'].touched && newCustomerFormGroup.controls['email'].errors?.['required']"
            class="text-red-500 text-xs mt-1 block"
          >
            Email is required.
          </span>
          <span
            *ngIf="newCustomerFormGroup.controls['email'].touched && newCustomerFormGroup.controls['email'].errors?.['email']"
            class="text-red-500 text-xs mt-1 block"
          >
            Email format is invalid.
          </span>
        </div>

        <div class="pt-4 flex items-center justify-end space-x-3">
          <button
            type="button"
            (click)="newCustomerFormGroup.reset()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors"
          >
            Clear
          </button>
          <button
            type="submit"
            [disabled]="newCustomerFormGroup.invalid || isSaving"
            class="px-6 py-2 text-sm font-medium text-white bg-gray-900 rounded-xl hover:bg-black transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center"
          >
            <svg
              *ngIf="isSaving"
              class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            {{ isSaving ? 'Saving...' : 'Save Client' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
