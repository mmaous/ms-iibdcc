<div class="min-h-screen bg-gray-50 p-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Analytics Dashboard</h1>
        <p class="text-gray-500">Real-time banking operations overview</p>
    </div>

    <ng-container *ngIf="dashboardData$ | async as charts; else loading">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-6">Monthly Operations</h2>
                <div class="relative w-full h-[250px]">
                    <canvas baseChart [data]="charts.monthlyChartData" [options]="commonOptions" [type]="'bar'"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-6">Account Type Distribution</h2>
                <div class="relative w-full h-[250px] p-4">
                    <canvas baseChart [data]="charts.pieChartData" [options]="doughnutOptions" [type]="'doughnut'"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-6">Recent Transaction Volume</h2>
                <div class="relative w-full h-[250px]">
                    <canvas baseChart [data]="charts.lineChartData" [options]="commonOptions" [type]="'line'"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-6">Top Customers by Balance</h2>
                <div class="relative w-full h-[250px]">
                    <canvas baseChart [data]="charts.topCustomersData" [options]="horizontalBarOptions" [type]="'bar'"></canvas>
                </div>
            </div>

        </div>
    </ng-container>

    <ng-template #loading>
        <div class="flex justify-center items-center h-64 text-gray-500 text-lg animate-pulse">
            Aggregating data...
        </div>
    </ng-template>
</div>
