<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <nav class="bg-gray-900 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0 font-bold text-xl tracking-tight flex items-center gap-2">
            <svg
              class="w-6 h-6 text-gray-300"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              />
            </svg>
              <a
                      routerLink="/admin/dashboard"
                      routerLinkActive="bg-gray-800 text-white"
              >
            DiGiBank
              </a>
          </div>
          <div class="hidden md:block">
            <div class="ml-10 flex items-baseline space-x-4">
              <a
                routerLink="/admin/customers"
                routerLinkActive="bg-gray-800 text-white"
                class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"
                >Customers</a
              >
              <a
                routerLink="/admin/accounts"
                routerLinkActive="bg-gray-800 text-white"
                class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors"
                >Accounts</a
              >
            </div>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <div class="text-sm text-gray-400">
            Session: <span class="font-semibold text-white">{{ authService.username }}</span>
          </div>
          <button
            (click)="handleLogout()"
            class="bg-gray-800 hover:bg-black text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-gray-700 shadow-sm flex items-center gap-2"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              ></path>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-7xl mx-auto p-6 sm:p-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 min-h-[500px]">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
