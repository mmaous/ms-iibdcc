<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Formulaire Produit</title>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-3">
    <div class="card col-md-6 offset-md-3">
        <div class="card-header" th:text="${product.id==null?'Saisir un Produit':'Modifier le Produit'}">Formulaire</div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/save}">

                <input type="hidden" name="id" th:value="${product.id}">

                <div class="mb-3">
                    <label class="form-label">Name :</label>
                    <input type="text" name="name" class="form-control" th:value="${product.name}">
                    <span th:if="${#fields.hasErrors('product.name')}" th:errors="${product.name}" class="text-danger"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price :</label>
                    <input type="text" name="price" class="form-control" th:value="${product.price}">
                    <span th:if="${#fields.hasErrors('product.price')}" th:errors="${product.price}" class="text-danger"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity :</label>
                    <input type="text" name="quantity" class="form-control" th:value="${product.quantity}">
                    <span th:if="${#fields.hasErrors('product.quantity')}" th:errors="${product.quantity}" class="text-danger"></span>
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
