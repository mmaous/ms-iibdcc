<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}">
    <title>Produits</title>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-3">
    <div class="card">
        <div class="card-header">Liste des produits</div>
        <div class="card-body">

            <form method="get" th:action="@{/user/index}" class="row g-3 align-items-center mb-3">
                <div class="col-auto">
                    <label class="col-form-label">Key word:</label>
                </div>
                <div class="col-auto">
                    <input type="text" name="keyword" class="form-control" th:value="${keyword}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Chercher</button>
                </div>
            </form>

            <table class="table table-striped table-bordered">
                <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Price</th><th>Quantity</th>
                    <th sec:authorize="hasRole('ADMIN')">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${listProducts}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.price}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="d-flex gap-2">
                            <form method="post" th:action="@{/admin/delete}">
                                <input type="hidden" name="id" th:value="${p.id}">
                                <button class="btn btn-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')">Delete</button>
                            </form>
                            <a class="btn btn-success" th:href="@{/admin/editProduct(id=${p.id})}">Edit</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
